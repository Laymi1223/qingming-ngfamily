// Firestore REST helpers
const FS_BASE = `https://firestore.googleapis.com/v1/projects/${FB_PROJECT}/databases/(default)/documents`;

async function fsGet(path) {
const r = await fetch(`${FS_BASE}/${path}?key=${FB_API_KEY}`);
if (!r.ok) return null;
const d = await r.json();
return fsDecodeDoc(d);
}

async function fsSet(path, data) {
const body = { fields: fsEncodeFields(data) };
const r = await fetch(`${FS_BASE}/${path}?key=${FB_API_KEY}`, {
method: “PATCH”, headers: {“Content-Type”:“application/json”},
body: JSON.stringify(body)
});
return r.ok;
}

// Firestore value encoding/decoding
function fsEncodeValue(v) {
if (v === null || v === undefined) return { nullValue: null };
if (typeof v === “boolean”) return { booleanValue: v };
if (typeof v === “number”) return { integerValue: String(v) };
if (typeof v === “string”) return { stringValue: v };
if (Array.isArray(v)) return { arrayValue: { values: v.map(fsEncodeValue) } };
if (typeof v === “object”) return { mapValue: { fields: fsEncodeFields(v) } };
return { stringValue: String(v) };
}
function fsEncodeFields(obj) {
const f = {};
for (const [k,v] of Object.entries(obj)) f[k] = fsEncodeValue(v);
return f;
}
function fsDecodeValue(v) {
if (!v) return null;
if (“nullValue” in v) return null;
if (“booleanValue” in v) return v.booleanValue;
if (“integerValue” in v) return Number(v.integerValue);
if (“doubleValue” in v) return v.doubleValue;
if (“stringValue” in v) return v.stringValue;
if (“arrayValue” in v) return (v.arrayValue.values || []).map(fsDecodeValue);
if (“mapValue” in v) return fsDecodeDoc(v.mapValue);
return null;
}
function fsDecodeDoc(doc) {
const fields = doc.fields || {};
const out = {};
for (const [k,v] of Object.entries(fields)) out[k] = fsDecodeValue(v);
return out;
}

// Storage REST upload (base64 → public URL)
async function storageUpload(path, base64dataUrl) {
// Convert base64 data URL to blob
const res = await fetch(base64dataUrl);
const blob = await res.blob();
const uploadUrl = `https://firebasestorage.googleapis.com/v0/b/${FB_BUCKET}/o?name=${encodeURIComponent(path)}&key=${FB_API_KEY}`;
const r = await fetch(uploadUrl, {
method: “POST”,
headers: { “Content-Type”: blob.type || “image/jpeg” },
body: blob
});
if (!r.ok) return null;
const json = await r.json();
return `https://firebasestorage.googleapis.com/v0/b/${FB_BUCKET}/o/${encodeURIComponent(json.name)}?alt=media`;
}

async function storageDelete(path) {
await fetch(`https://firebasestorage.googleapis.com/v0/b/${FB_BUCKET}/o/${encodeURIComponent(path)}?key=${FB_API_KEY}`, { method: “DELETE” });
}

// ── GALLERY TAB ──
function GalleryTab(){
const [selectedLoc,setSelectedLoc]=useState(“全部”);
const [selectedYear,setSelectedYear]=useState(“全部”);
const [galleryData,setGalleryData]=useState(DEFAULT_GALLERY);
const [uploadLoc,setUploadLoc]=useState(“婆太墓”);
const [addingYear,setAddingYear]=useState(String(DEFAULT_YEAR));
const [addingCaption,setAddingCaption]=useState(””);
const [lightbox,setLightbox]=useState(null);
const [showUpload,setShowUpload]=useState(false);
const [uploading,setUploading]=useState(false);
const [syncStatus,setSyncStatus]=useState(“idle”);
const fileRef=useRef();

// Load from Firestore on mount
useEffect(()=>{
fsGet(“gallery/photos”).then(data=>{
if(data && Object.keys(data).length>0){
// Merge with defaults (keep default 2025 photos if no firebase data for that loc)
const merged={…DEFAULT_GALLERY};
for(const [loc,photos] of Object.entries(data)){
if(Array.isArray(photos) && photos.length>0) merged[loc]=photos;
}
setGalleryData(merged);
}
}).catch(()=>{});
},[]);

const saveToFirestore = useCallback(async(newData)=>{
setSyncStatus(“saving”);
// Only save non-base64 (Firebase Storage URLs), not the embedded IMGS
const toSave={};
for(const [loc,photos] of Object.entries(newData)){
toSave[loc]=photos.filter(p=>p.storagePath); // only user-uploaded ones
}
const ok = await fsSet(“gallery/photos”, toSave);
setSyncStatus(ok?“saved”:“error”);
setTimeout(()=>setSyncStatus(“idle”),3000);
},[]);

const allPhotos=GALLERY_LOCATIONS.flatMap(loc=>(galleryData[loc]||[]).map(p=>({…p,loc})));
const allYears=[…new Set(allPhotos.map(p=>p.year))].sort((a,b)=>b-a);
const visiblePhotos=(()=>{
const pool=selectedLoc===“全部”?allPhotos:(galleryData[selectedLoc]||[]).map(p=>({…p,loc:selectedLoc}));
return selectedYear===“全部”?pool:pool.filter(p=>p.year===selectedYear);
})();

const handleFileChange=async(e)=>{
const file=e.target.files[0];
if(!file) return;
setUploading(true);
setSyncStatus(“saving”);
const reader=new FileReader();
reader.onload=async(ev)=>{
const base64=ev.target.result;
// Compress image before upload
const compressed = await compressImage(base64, 800, 0.7);
const storagePath=`gallery/${uploadLoc}/${Date.now()}_${file.name}`;
const url=await storageUpload(storagePath, compressed);
const newPhoto={year:addingYear, url: url||compressed, caption:addingCaption||`${uploadLoc} ${addingYear}`, storagePath: url?storagePath:null};
const newData={…galleryData,[uploadLoc]:[…(galleryData[uploadLoc]||[]),newPhoto]};
setGalleryData(newData);
await saveToFirestore(newData);
setAddingCaption(””);
setShowUpload(false);
setUploading(false);
};
reader.readAsDataURL(file);
e.target.value=””;
};

const removePhoto=async(loc,idx)=>{
const photo=(galleryData[loc]||[])[idx];
if(photo?.storagePath) await storageDelete(photo.storagePath).catch(()=>{});
const newData={…galleryData,[loc]:(galleryData[loc]||[]).filter((_,i)=>i!==idx)};
setGalleryData(newData);
await saveToFirestore(newData);
};

const totalCount=allPhotos.length;

return(
<div style={{padding:“16px 16px 80px”}}>
<div style={{display:“flex”,justifyContent:“space-between”,alignItems:“center”,marginBottom:14}}>
<p style={{fontSize:12,color:”#a08060”,margin:0}}>每年上传照片，留作参考</p>
<SyncBadge status={syncStatus}/>
</div>


  <div style={{marginBottom:10}}>
    <div style={{fontSize:11,color:"#a08060",marginBottom:6}}>按地点</div>
    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
      {["全部",...GALLERY_LOCATIONS].map(l=>{
        const cnt=l==="全部"?totalCount:(galleryData[l]||[]).length;
        const active=selectedLoc===l;
        return(<button key={l} onClick={()=>setSelectedLoc(l)} style={{padding:"5px 11px",borderRadius:20,border:`1px solid ${active?"#c8960c":"#3d2000"}`,background:active?"#c8960c22":"#2a1200",color:active?"#c8960c":"#a08060",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>
          {l}{cnt>0&&<span style={{marginLeft:4,fontSize:10,color:active?"#c8960c":"#6a5040"}}>({cnt})</span>}
        </button>);
      })}
    </div>
  </div>

  <div style={{marginBottom:14}}>
    <div style={{fontSize:11,color:"#a08060",marginBottom:6}}>按年份</div>
    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
      {["全部",...allYears].map(y=>{
        const active=selectedYear===y;
        return(<button key={y} onClick={()=>setSelectedYear(y)} style={{padding:"5px 14px",borderRadius:20,border:`1px solid ${active?"#ffd700":"#3d2000"}`,background:active?"#ffd70022":"#2a1200",color:active?"#ffd700":"#a08060",fontSize:12,cursor:"pointer",fontFamily:"inherit",fontWeight:active?"bold":"normal"}}>{y}</button>);
      })}
    </div>
  </div>

        <div style={{flex:2}}>
          <div style={{fontSize:11,color:"#a08060",marginBottom:4}}>备注（可选）</div>
          <input value={addingCaption} onChange={e=>setAddingCaption(e.target.value)} placeholder="例：贡品摆法" style={{width:"100%",background:"#1a0a00",border:"1px solid #3d2000",borderRadius:8,color:"#f5e6c8",fontSize:13,padding:"6px 10px",fontFamily:"inherit",boxSizing:"border-box"}}/>
        </div>
      </div>
      <input ref={fileRef} type="file" accept="image/*" onChange={handleFileChange} style={{display:"none"}}/>
      <button onClick={()=>!uploading&&fileRef.current.click()} style={{width:"100%",padding:"10px",background:uploading?"#2a1200":"#3d1a00",border:"1px dashed #c8960c",borderRadius:10,color:uploading?"#a08060":"#c8960c",fontSize:13,cursor:uploading?"not-allowed":"pointer",fontFamily:"inherit"}}>
        {uploading?"⏳ 上传中…":`📷 选择照片 → ${uploadLoc}`}
      </button>
    </div>
  )}

  {visiblePhotos.length===0?(
    <div style={{textAlign:"center",padding:"40px 20px",color:"#5a4030",fontSize:13}}>
      {selectedYear!=="全部"?`${selectedYear} 年没有照片`:"还没有照片"}<br/>上传照片作记录吧
    </div>
  ):(
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      {visiblePhotos.map((p,i)=>{
        const realIdx=(galleryData[p.loc]||[]).findIndex(x=>x===p||(x.url===p.url&&x.year===p.year));
        return(
          <div key={i} style={{borderRadius:10,overflow:"hidden",border:"1px solid #3d2000",background:"#2a1200"}}>
            <img src={p.url} alt={p.caption} onClick={()=>setLightbox(p)} style={{width:"100%",height:160,objectFit:"cover",display:"block",cursor:"zoom-in"}}/>
            <div style={{padding:"6px 8px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div>
                <div style={{display:"flex",gap:4,alignItems:"center"}}>
                  <span style={{fontSize:12,color:"#ffd700",fontWeight:"bold"}}>{p.year}</span>
                  {selectedLoc==="全部"&&<span style={{fontSize:10,color:"#c8960c",background:"#c8960c22",padding:"1px 6px",borderRadius:8}}>{p.loc}</span>}
                </div>
                <div style={{fontSize:10,color:"#a08060"}}>{p.caption}</div>
              </div>
              <button onClick={()=>removePhoto(p.loc,realIdx)} style={{background:"none",border:"none",color:"#5a4030",cursor:"pointer",fontSize:16,padding:"2px"}}>✕</button>
            </div>
          </div>
        );
      })}
    </div>
  )}

  {lightbox&&(
    <div onClick={()=>setLightbox(null)} style={{position:"fixed",inset:0,background:"#000e",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{maxWidth:480,width:"100%"}} onClick={e=>e.stopPropagation()}>
        <img src={lightbox.url} alt={lightbox.caption} style={{width:"100%",height:"auto",borderRadius:12,display:"block"}}/>
        <div style={{textAlign:"center",marginTop:8,color:"#ffd700",fontSize:14,fontWeight:"bold"}}>{lightbox.year}</div>
        <div style={{textAlign:"center",color:"#c8960c",fontSize:12,marginTop:2}}>{lightbox.loc&&`${lightbox.loc} · `}{lightbox.caption}</div>
        <button onClick={()=>setLightbox(null)} style={{display:"block",margin:"14px auto 0",padding:"8px 24px",background:"#3d1a00",border:"1px solid #c8960c",borderRadius:20,color:"#c8960c",cursor:"pointer",fontFamily:"inherit"}}>关闭</button>
      </div>
    </div>
  )}
</div>


);
}

// Image compression helper
async function compressImage(dataUrl, maxWidth, quality){
return new Promise(resolve=>{
const img=new Image();
img.onload=()=>{
const scale=Math.min(1, maxWidth/img.width);
const canvas=document.createElement(“canvas”);
canvas.width=img.width*scale; canvas.height=img.height*scale;
canvas.getContext(“2d”).drawImage(img,0,0,canvas.width,canvas.height);
resolve(canvas.toDataURL(“image/jpeg”,quality));
};
img.src=dataUrl;
});
}

const [filterFam,setFilterFam]=useState(“全部”);

<div key={opt} style={{display:“flex”,alignItems:“center”,gap:4,background:getFamColor(opt)+“22”,border:`1px solid ${getFamColor(opt)}`,borderRadius:20,padding:“3px 10px”}}>
<span style={{fontSize:12,color:getFamColor(opt)}}>{opt}</span>
<span onClick={()=>removeFamOption(opt)} style={{fontSize:12,color:”#a08060”,cursor:“pointer”}}>✕</span>

))}

<input value={newFamInput} onChange={e=>setNewFamInput(e.target.value)} onKeyDown={e=>e.key===“Enter”&&addFamOption()} placeholder=“新增负责人名称…” style={{flex:1,background:”#1a0a00”,border:“1px solid #3d2000”,borderRadius:8,color:”#f5e6c8”,fontSize:13,padding:“6px 10px”,fontFamily:“inherit”}}/>
<button onClick={addFamOption} style={{padding:“6px 14px”,background:”#3d1a00”,border:“1px solid #c8960c”,borderRadius:8,color:”#c8960c”,cursor:“pointer”,fontFamily:“inherit”,fontSize:13}}>＋ 加入</button>
</div>
</div>
)}
</div>
<div style={{marginBottom:10}}>
<div style={{fontSize:11,color:”#a08060”,marginBottom:6}}>按墓地</div>
<div style={{display:“flex”,gap:6,flexWrap:“wrap”}}>
{[“全部”,…LOCATIONS].map(l=>(<button key={l} onClick={()=>setFilterLoc(l)} style={{padding:“4px 11px”,borderRadius:20,border:`1px solid ${filterLoc===l?"#c8960c":"#3d2000"}`,background:filterLoc===l?”#c8960c22”:“transparent”,color:filterLoc===l?”#c8960c”:”#a08060”,fontSize:12,cursor:“pointer”,fontFamily:“inherit”}}>{l}</button>))}
</div>
</div>

<div style={{fontSize:11,color:”#a08060”,marginBottom:6}}>按负责人</div>
<div style={{display:“flex”,gap:6,flexWrap:“wrap”}}>

))}
</div>

))}

);
}

// ── MAIN APP ──
function QingmingApp(){
const [tab,setTab]=useState(“route”);
const [year,setYear]=useState(DEFAULT_YEAR);
const [editingYear,setEditingYear]=useState(false);
const [items,setItems]=useState(DEFAULT_ITEMS);
const [checked,setChecked]=useState({});
const [famOptions,setFamOptions]=useState([””,“小叔 fam”,“小妹 fam”,“Everyone”,“爸爸”,“妈妈”]);
const [shopSyncStatus,setShopSyncStatus]=useState(“idle”);
const saveTimer=useRef(null);

// Load shopping state from Firestore on mount
useEffect(()=>{
fsGet(“shopping/state”).then(data=>{
if(data){
if(data.items && Array.isArray(data.items)) setItems(data.items);
if(data.checked) setChecked(data.checked);
if(data.famOptions && Array.isArray(data.famOptions)) setFamOptions(data.famOptions);
}
}).catch(()=>{});
},[]);

// Auto-save shopping state (debounced 1.5s)
const saveShoppingState = useCallback((newItems, newChecked, newFamOptions)=>{
clearTimeout(saveTimer.current);
setShopSyncStatus(“saving”);
saveTimer.current=setTimeout(async()=>{
const ok=await fsSet(“shopping/state”,{items:newItems, checked:newChecked, famOptions:newFamOptions});
setShopSyncStatus(ok?“saved”:“error”);
setTimeout(()=>setShopSyncStatus(“idle”),3000);
},1500);
},[]);

const handleSetItems=(updater)=>{
setItems(prev=>{const next=typeof updater===“function”?updater(prev):updater;saveShoppingState(next,checked,famOptions);return next;});
};
const handleSetChecked=(updater)=>{
setChecked(prev=>{const next=typeof updater===“function”?updater(prev):updater;saveShoppingState(items,next,famOptions);return next;});
};
const handleSetFamOptions=(updater)=>{
setFamOptions(prev=>{const next=typeof updater===“function”?updater(prev):updater;saveShoppingState(items,checked,next);return next;});
};

const TABS=[{id:“route”,icon:“🗺️”,label:“路线”},{id:“guide”,icon:“📋”,label:“步骤”},{id:“gallery”,icon:“📷”,label:“照片”},{id:“shop”,icon:“🛒”,label:“采购”}];

return(
<div style={{minHeight:“100vh”,background:”#1a0a00”,fontFamily:”‘Noto Serif SC’,‘SimSun’,serif”,color:”#f5e6c8”,maxWidth:480,margin:“0 auto”}}>
<div style={{background:“linear-gradient(180deg,#3d1a00 0%,#1a0a00 100%)”,padding:“18px 20px 10px”,textAlign:“center”,borderBottom:“1px solid #c8960c44”,position:“sticky”,top:0,zIndex:100}}>
<div style={{fontSize:22,marginBottom:1}}>🌿</div>
<div style={{fontSize:19,fontWeight:“bold”,color:”#c8960c”,letterSpacing:4}}>清明祭祖指南</div>
<div style={{display:“flex”,alignItems:“center”,justifyContent:“center”,gap:6,marginTop:3}}>
{editingYear?(
<input type=“number” value={year} onChange={e=>setYear(Number(e.target.value))} onBlur={()=>setEditingYear(false)} onKeyDown={e=>e.key===“Enter”&&setEditingYear(false)} autoFocus style={{width:70,background:”#3d1a00”,border:“1px solid #c8960c”,borderRadius:6,color:”#ffd580”,fontSize:13,textAlign:“center”,fontFamily:“inherit”,padding:“2px 4px”}}/>
):(
<span onClick={()=>setEditingYear(true)} style={{fontSize:12,color:”#a08060”,letterSpacing:2,cursor:“pointer”,borderBottom:“1px dashed #a08060”}}>{year} 年 · 点击修改</span>
)}
</div>
</div>
<div style={{display:“flex”,borderBottom:“1px solid #3d2000”,background:”#1a0a00”,position:“sticky”,top:76,zIndex:99}}>
{TABS.map(t=>(<button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:“10px 4px”,border:“none”,cursor:“pointer”,background:tab===t.id?”#3d1a00”:“transparent”,color:tab===t.id?”#c8960c”:”#a08060”,fontSize:12,fontFamily:“inherit”,borderBottom:tab===t.id?“2px solid #c8960c”:“2px solid transparent”}}>
{t.icon}<br/><span style={{fontSize:10}}>{t.label}</span>
</button>))}
</div>
{tab===“route”&&<RouteTab/>}
{tab===“guide”&&<GuideTab/>}
{tab===“gallery”&&<GalleryTab/>}
{tab===“shop”&&<ShoppingTab items={items} setItems={handleSetItems} checked={checked} setChecked={handleSetChecked} famOptions={famOptions} setFamOptions={handleSetFamOptions} syncStatus={shopSyncStatus}/>}
<div style={{position:“fixed”,bottom:0,left:“50%”,transform:“translateX(-50%)”,width:“100%”,maxWidth:480,background:”#1a0a00”,borderTop:“1px solid #3d2000”,padding:“6px 16px”,textAlign:“center”,fontSize:10,color:”#5a4030”}}>
🌿 愿先人安息，后代平安
</div>
</div>
);
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(QingmingApp));


  </script>
</body>
</html>
